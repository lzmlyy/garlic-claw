services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "23330:23330"
      - "23331:23331"
    env_file: .env
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=production
    volumes:
      - server_data:/app/packages/server
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server_data:
