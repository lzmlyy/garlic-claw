# Garlic Claw 项目 Python 配置
# 包含项目元数据、ruff（代码检查/格式化）和 mypy（类型检查）配置

# ============================================
# Ruff 配置 - 快速的 Python 代码检查器和格式化器
# ============================================
[tool.ruff]
# Python 版本目标
target-version = "py313"

# 代码行长度限制
line-length = 150

# 排除的目录/文件
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "node_modules",
    "*.egg-info",
    "dist",
    "build",
]

# Ruff 的 lint 规则配置
[tool.ruff.lint]
# 启用的规则集
select = [
    "E",   # pycodestyle 错误
    "W",   # pycodestyle 警告
    "F",   # Pyflakes
    "I",   # isort（导入排序）
    "B",   # flake8-bugbear（常见 bug 检测）
    "C4",  # flake8-comprehensions（推导式优化）
    "UP",  # pyupgrade（Python 语法升级）
    "N",   # pep8-naming（命名规范）
    "SIM", # flake8-simplify（代码简化）
    "TCH", # flake8-type-checking（类型检查优化）
    "RUF", # Ruff 特有规则
]

# 忽略的规则
ignore = [
    "E501", # 行太长（由 formatter 处理）
    "E731", # 不要将 lambda 赋值给变量
    "N",    # 当前脚本已采用 camelCase/中文命名混合，不做强制改名
    "RUF001", # 允许中文全角标点
    "RUF002", # 允许中文注释/文档中的全角标点
    "TC003", # 脚本工具函数不强制移动到 TYPE_CHECKING
    "TC006", # 允许运行时 cast 使用现有泛型写法
]

fixable = ["ALL"]
unfixable = []

# Ruff 格式化配置
[tool.ruff.format]
# 引号风格：双引号
quote-style = "double"
# 缩进：4 个空格
indent-style = "space"
# 自动检测换行符
line-ending = "auto"

# ============================================
# Mypy 配置 - 静态类型检查器
# ============================================

[tool.mypy]
python_version = "3.13"
# 严格模式（启用多个严格检查选项）
strict = true
# 忽略缺失导入的警告（适用于没有类型存根的第三方库）
ignore_missing_imports = true
# 显示错误代码
show_error_codes = true
# 美化错误输出
pretty = true
# 不允许函数隐式缺少返回
warn_no_return = true

# Mypy 特定路径配置（可选）
# 可以为特定模块设置不同的检查规则
[[tool.mypy.overrides]]
# 示例：对测试文件放宽某些检查
module = ["tests.*"]
disallow_untyped_defs = false
